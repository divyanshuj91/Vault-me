<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern Minimalist Gradient -->
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/> <!-- Soft Purple -->
      <stop offset="100%" stop-color="#22d3ee"/> <!-- Soft Cyan -->
    </linearGradient>
  </defs>

  <!-- Minimal Shield Outline -->
  <path d="M256,64 C190,112 144,112 144,224 C144,320 192,390 256,448 C320,390 368,320 368,224 C368,112 322,112 256,64 Z" 
        fill="none" 
        stroke="url(#shieldBorder)" 
        stroke-width="36" 
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Minimal Keyhole Indicator in the Center -->
  <g transform="translate(0, 8)">
    <circle cx="256" cy="220" r="28" fill="url(#shieldBorder)"/>
    <path d="M242,228 L270,228 L286,292 C286,296 282,300 278,300 L234,300 C230,300 226,296 226,292 Z" fill="url(#shieldBorder)"/>
  </g>
</svg>